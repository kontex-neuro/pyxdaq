name: Test package

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    strategy:
      matrix:
        os_arch:
          [
            { os: windows-2022, arch: x64 },
            { os: macos-15, arch: arm64 },
            { os: ubuntu-24.04, arch: x64 }
          ]

    runs-on: ${{ matrix.os_arch.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: |
            3.12
            3.13

      - name: Install tox
        run: pipx install tox

      - name: Run tox
        run: tox
